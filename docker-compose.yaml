services:
  backend:
    build: /Backend/demo
    ports:
      - "9096:9096"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - db

      
      - redis

  frontend:
    build: /FrontEnd/Chat-Frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:15   # ✅ space after colon
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"